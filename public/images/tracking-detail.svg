<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="50%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#22d3ee;stop-opacity:0.1"/>
    </linearGradient>
    <filter id="neon">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="600" fill="url(#bg1)"/>
  <rect width="800" height="600" fill="url(#glow1)" opacity="0.5"/>
  <!-- Grid lines -->
  <g stroke="#6366f1" stroke-width="0.5" opacity="0.15">
    <line x1="0" y1="0" x2="800" y2="0"/><line x1="0" y1="50" x2="800" y2="50"/>
    <line x1="0" y1="100" x2="800" y2="100"/><line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="0" y1="200" x2="800" y2="200"/><line x1="0" y1="250" x2="800" y2="250"/>
    <line x1="0" y1="300" x2="800" y2="300"/><line x1="0" y1="350" x2="800" y2="350"/>
    <line x1="0" y1="400" x2="800" y2="400"/><line x1="0" y1="450" x2="800" y2="450"/>
    <line x1="0" y1="500" x2="800" y2="500"/><line x1="0" y1="550" x2="800" y2="550"/>
    <line x1="0" y1="0" x2="0" y2="600"/><line x1="50" y1="0" x2="50" y2="600"/>
    <line x1="100" y1="0" x2="100" y2="600"/><line x1="150" y1="0" x2="150" y2="600"/>
    <line x1="200" y1="0" x2="200" y2="600"/><line x1="250" y1="0" x2="250" y2="600"/>
    <line x1="300" y1="0" x2="300" y2="600"/><line x1="350" y1="0" x2="350" y2="600"/>
    <line x1="400" y1="0" x2="400" y2="600"/><line x1="450" y1="0" x2="450" y2="600"/>
    <line x1="500" y1="0" x2="500" y2="600"/><line x1="550" y1="0" x2="550" y2="600"/>
    <line x1="600" y1="0" x2="600" y2="600"/><line x1="650" y1="0" x2="650" y2="600"/>
    <line x1="700" y1="0" x2="700" y2="600"/><line x1="750" y1="0" x2="750" y2="600"/>
  </g>
  <!-- Circuit traces -->
  <g fill="none" stroke="#22d3ee" stroke-width="2" opacity="0.4" filter="url(#neon)">
    <path d="M80,100 L200,100 L200,180 L350,180"/>
    <circle cx="350" cy="180" r="4" fill="#22d3ee"/>
    <path d="M80,200 L250,200 L250,280 L400,280"/>
    <circle cx="400" cy="280" r="4" fill="#22d3ee"/>
    <path d="M600,100 L500,100 L500,200 L400,200"/>
    <circle cx="400" cy="200" r="4" fill="#22d3ee"/>
    <path d="M700,300 L550,300 L550,400 L450,400"/>
    <circle cx="450" cy="400" r="4" fill="#22d3ee"/>
    <path d="M100,400 L250,400 L250,500 L400,500"/>
    <circle cx="400" cy="500" r="4" fill="#22d3ee"/>
    <path d="M600,500 L500,500 L500,420 L400,420"/>
    <circle cx="400" cy="420" r="4" fill="#22d3ee"/>
  </g>
  <!-- Main car circuit board -->
  <g transform="translate(400,300)">
    <rect x="-120" y="-80" width="240" height="160" rx="12" fill="#1e293b" stroke="#6366f1" stroke-width="2" opacity="0.8"/>
    <rect x="-100" y="-60" width="200" height="120" rx="8" fill="#0f172a" stroke="#22d3ee" stroke-width="1" opacity="0.6"/>
    <!-- Chip -->
    <rect x="-40" y="-30" width="80" height="60" rx="4" fill="#6366f1" opacity="0.3"/>
    <text x="0" y="5" text-anchor="middle" fill="#22d3ee" font-size="12" font-family="monospace" opacity="0.8">STM32</text>
    <!-- Sensor dots -->
    <circle cx="-80" cy="0" r="5" fill="#22d3ee" opacity="0.6"/>
    <circle cx="-60" cy="0" r="5" fill="#22d3ee" opacity="0.8"/>
    <circle cx="60" cy="0" r="5" fill="#22d3ee" opacity="0.8"/>
    <circle cx="80" cy="0" r="5" fill="#22d3ee" opacity="0.6"/>
    <!-- Pins -->
    <line x1="-40" y1="-30" x2="-40" y2="-45" stroke="#6366f1" stroke-width="1.5"/>
    <line x1="-20" y1="-30" x2="-20" y2="-45" stroke="#6366f1" stroke-width="1.5"/>
    <line x1="0" y1="-30" x2="0" y2="-45" stroke="#6366f1" stroke-width="1.5"/>
    <line x1="20" y1="-30" x2="20" y2="-45" stroke="#6366f1" stroke-width="1.5"/>
    <line x1="40" y1="-30" x2="40" y2="-45" stroke="#6366f1" stroke-width="1.5"/>
    <line x1="-40" y1="30" x2="-40" y2="45" stroke="#6366f1" stroke-width="1.5"/>
    <line x1="-20" y1="30" x2="-20" y2="45" stroke="#6366f1" stroke-width="1.5"/>
    <line x1="0" y1="30" x2="0" y2="45" stroke="#6366f1" stroke-width="1.5"/>
    <line x1="20" y1="30" x2="20" y2="45" stroke="#6366f1" stroke-width="1.5"/>
    <line x1="40" y1="30" x2="40" y2="45" stroke="#6366f1" stroke-width="1.5"/>
  </g>
  <!-- Wheels -->
  <g transform="translate(320,380)">
    <circle cx="0" cy="0" r="18" fill="none" stroke="#22d3ee" stroke-width="2" opacity="0.4"/>
    <circle cx="0" cy="0" r="8" fill="#22d3ee" opacity="0.2"/>
    <line x1="-12" y1="-12" x2="12" y2="12" stroke="#22d3ee" stroke-width="1" opacity="0.4"/>
    <line x1="-12" y1="12" x2="12" y2="-12" stroke="#22d3ee" stroke-width="1" opacity="0.4"/>
  </g>
  <g transform="translate(480,380)">
    <circle cx="0" cy="0" r="18" fill="none" stroke="#22d3ee" stroke-width="2" opacity="0.4"/>
    <circle cx="0" cy="0" r="8" fill="#22d3ee" opacity="0.2"/>
    <line x1="-12" y1="-12" x2="12" y2="12" stroke="#22d3ee" stroke-width="1" opacity="0.4"/>
    <line x1="-12" y1="12" x2="12" y2="-12" stroke="#22d3ee" stroke-width="1" opacity="0.4"/>
  </g>
  <!-- Floating particles -->
  <g fill="#22d3ee" opacity="0.3">
    <circle cx="120" cy="450" r="2"/><circle cx="680" cy="150" r="1.5"/>
    <circle cx="650" cy="500" r="2"/><circle cx="150" cy="120" r="1.5"/>
    <circle cx="700" cy="250" r="1"/><circle cx="100" cy="300" r="1"/>
  </g>
  <!-- Label -->
  <text x="400" y="560" text-anchor="middle" fill="#6366f1" font-size="16" font-family="monospace" opacity="0.5">8-Way Tracking Car</text>
</svg>
