<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="50%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="glow2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:0.1"/>
    </linearGradient>
    <filter id="neon2">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="600" fill="url(#bg2)"/>
  <rect width="800" height="600" fill="url(#glow2)" opacity="0.5"/>
  <!-- Grid -->
  <g stroke="#a855f7" stroke-width="0.5" opacity="0.12">
    <line x1="0" y1="0" x2="800" y2="0"/><line x1="0" y1="50" x2="800" y2="50"/>
    <line x1="0" y1="100" x2="800" y2="100"/><line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="0" y1="200" x2="800" y2="200"/><line x1="0" y1="250" x2="800" y2="250"/>
    <line x1="0" y1="300" x2="800" y2="300"/><line x1="0" y1="350" x2="800" y2="350"/>
    <line x1="0" y1="400" x2="800" y2="400"/><line x1="0" y1="450" x2="800" y2="450"/>
    <line x1="0" y1="500" x2="800" y2="500"/><line x1="0" y1="550" x2="800" y2="550"/>
    <line x1="0" y1="0" x2="0" y2="600"/><line x1="50" y1="0" x2="50" y2="600"/>
    <line x1="100" y1="0" x2="100" y2="600"/><line x1="150" y1="0" x2="150" y2="600"/>
    <line x1="200" y1="0" x2="200" y2="600"/><line x1="250" y1="0" x2="250" y2="600"/>
    <line x1="300" y1="0" x2="300" y2="600"/><line x1="350" y1="0" x2="350" y2="600"/>
    <line x1="400" y1="0" x2="400" y2="600"/><line x1="450" y1="0" x2="450" y2="600"/>
    <line x1="500" y1="0" x2="500" y2="600"/><line x1="550" y1="0" x2="550" y2="600"/>
    <line x1="600" y1="0" x2="600" y2="600"/><line x1="650" y1="0" x2="650" y2="600"/>
    <line x1="700" y1="0" x2="700" y2="600"/><line x1="750" y1="0" x2="750" y2="600"/>
  </g>
  <!-- Gyroscope rings -->
  <g transform="translate(400,280)" filter="url(#neon2)">
    <!-- Outer ring -->
    <ellipse cx="0" cy="0" rx="100" ry="100" fill="none" stroke="#22d3ee" stroke-width="2" opacity="0.3"/>
    <!-- Middle ring tilted -->
    <ellipse cx="0" cy="0" rx="80" ry="80" fill="none" stroke="#a855f7" stroke-width="2" opacity="0.3"
             transform="rotate(60)" stroke-dasharray="8,4"/>
    <!-- Inner ring -->
    <ellipse cx="0" cy="0" rx="55" ry="55" fill="none" stroke="#22d3ee" stroke-width="1.5" opacity="0.5"
             transform="rotate(-30)"/>
    <!-- Axis -->
    <line x1="-120" y1="0" x2="120" y2="0" stroke="#6366f1" stroke-width="1.5" opacity="0.4"/>
    <line x1="0" y1="-120" x2="0" y2="120" stroke="#6366f1" stroke-width="1.5" opacity="0.4"/>
    <!-- Center hub -->
    <circle cx="0" cy="0" r="12" fill="none" stroke="#22d3ee" stroke-width="2" opacity="0.6"/>
    <circle cx="0" cy="0" r="5" fill="#22d3ee" opacity="0.4"/>
  </g>
  <!-- Balance car body -->
  <g transform="translate(400,280)" filter="url(#neon2)">
    <rect x="-50" y="-70" width="100" height="30" rx="6" fill="#1e293b" stroke="#6366f1" stroke-width="1.5" opacity="0.7"/>
    <!-- Sensor on top -->
    <rect x="-12" y="-90" width="24" height="20" rx="3" fill="#0f172a" stroke="#22d3ee" stroke-width="1" opacity="0.5"/>
    <line x1="-5" y1="-90" x2="-5" y2="-75" stroke="#6366f1" stroke-width="1"/>
    <line x1="5" y1="-90" x2="5" y2="-75" stroke="#6366f1" stroke-width="1"/>
    <!-- Body details -->
    <rect x="-35" y="-40" width="70" height="25" rx="4" fill="#0f172a" stroke="#a855f7" stroke-width="1" opacity="0.4"/>
    <text x="0" y="-25" text-anchor="middle" fill="#22d3ee" font-size="10" font-family="monospace" opacity="0.7">MPU6050</text>
    <!-- Pendulum angle indication -->
    <line x1="0" y1="-70" x2="30" y2="-95" stroke="#22d3ee" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>
    <line x1="0" y1="-70" x2="-30" y2="-95" stroke="#22d3ee" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>
    <text x="35" y="-92" fill="#22d3ee" font-size="9" font-family="monospace" opacity="0.4">蟷</text>
    <text x="-40" y="-92" fill="#22d3ee" font-size="9" font-family="monospace" opacity="0.4">-蟷</text>
  </g>
  <!-- Two wheels -->
  <g transform="translate(350,350)">
    <circle cx="0" cy="0" r="22" fill="none" stroke="#22d3ee" stroke-width="2.5" opacity="0.5"/>
    <circle cx="0" cy="0" r="10" fill="#22d3ee" opacity="0.15"/>
    <line x1="-15" y1="-15" x2="15" y2="15" stroke="#22d3ee" stroke-width="1.5" opacity="0.4"/>
    <line x1="-15" y1="15" x2="15" y2="-15" stroke="#22d3ee" stroke-width="1.5" opacity="0.4"/>
    <circle cx="0" cy="0" r="3" fill="#22d3ee" opacity="0.4"/>
  </g>
  <g transform="translate(450,350)">
    <circle cx="0" cy="0" r="22" fill="none" stroke="#22d3ee" stroke-width="2.5" opacity="0.5"/>
    <circle cx="0" cy="0" r="10" fill="#22d3ee" opacity="0.15"/>
    <line x1="-15" y1="-15" x2="15" y2="15" stroke="#22d3ee" stroke-width="1.5" opacity="0.4"/>
    <line x1="-15" y1="15" x2="15" y2="-15" stroke="#22d3ee" stroke-width="1.5" opacity="0.4"/>
    <circle cx="0" cy="0" r="3" fill="#22d3ee" opacity="0.4"/>
  </g>
  <!-- Data flow lines -->
  <g fill="none" stroke="#a855f7" stroke-width="1" opacity="0.3">
    <path d="M400,190 Q420,170 450,170 L500,170 Q530,170 530,200 L530,250"/>
    <path d="M400,190 Q380,170 350,170 L300,170 Q270,170 270,200 L270,250"/>
  </g>
  <!-- Floating dots -->
  <g fill="#22d3ee" opacity="0.3">
    <circle cx="100" cy="450" r="2"/><circle cx="700" cy="120" r="1.5"/>
    <circle cx="650" cy="520" r="2"/><circle cx="130" cy="100" r="1.5"/>
    <circle cx="720" cy="400" r="1"/><circle cx="80" cy="300" r="1"/>
    <circle cx="200" cy="550" r="1.5"/><circle cx="600" cy="550" r="1.5"/>
  </g>
  <!-- Label -->
  <text x="400" y="560" text-anchor="middle" fill="#a855f7" font-size="16" font-family="monospace" opacity="0.5">Self-Balancing Car</text>
</svg>
